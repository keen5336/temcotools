services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ops_tools
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ops_tools
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - temco_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops_tools -d ops_tools"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    container_name: temcotools
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://ops_tools:password@db:5432/ops_tools
        SESSION_SECRET: ${SESSION_SECRET:-changeme-at-least-32-characters-long}
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://ops_tools:password@db:5432/ops_tools
      SESSION_SECRET: ${SESSION_SECRET:-changeme-at-least-32-characters-long}
      TRUST_PROXY: "true"
      PROTOCOL: "https"
      NODE_ENV: "production"
      NEXTAUTH_URL: "https://temco.chronchive.com"
      NEXT_PUBLIC_APP_URL: "https://temco.chronchive.com"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    depends_on:
      db:
        condition: service_healthy
    networks:
      temco_net:
        aliases:
          - temcotools.internal

networks:
  temco_net:
    driver: bridge

volumes:
  db_data:
