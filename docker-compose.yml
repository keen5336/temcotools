services:
  db:
    image: postgres@sha256:1d1095b0503145be79c79239372aefadfacf6b7c33c9245bbf99ce4b6b89c737
    restart: unless-stopped
    environment:
      POSTGRES_USER: ops_tools
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ops_tools
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - temco_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops_tools -d ops_tools"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    container_name: temcotools
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ADMIN_FILE_MANAGER_ROOT: /data/admin-files
      DATABASE_URL: postgresql://ops_tools:password@db:5432/ops_tools
      SESSION_SECRET: ${SESSION_SECRET:-changeme-at-least-32-characters-long}
      TRUST_PROXY: "true"
      PROTOCOL: "https"
      NODE_ENV: "production"
      NEXTAUTH_URL: "https://temco.chronchive.com"
      NEXT_PUBLIC_APP_URL: "https://temco.chronchive.com"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./runtime/admin-files:/data/admin-files
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/signin || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      temco_net:
        aliases:
          - temcotools.internal

networks:
  temco_net:
    driver: bridge

volumes:
  db_data:
