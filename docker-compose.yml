services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ops_tools
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ops_tools
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - temco_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://ops_tools:password@db:5432/ops_tools
        SESSION_SECRET: ${SESSION_SECRET:-changeme-at-least-32-characters-long}
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://ops_tools:password@db:5432/ops_tools
      SESSION_SECRET: ${SESSION_SECRET:-changeme-at-least-32-characters-long}
    depends_on:
      - db
    networks:
      - temco_net

networks:
  temco_net:
    driver: bridge

volumes:
  db_data:
